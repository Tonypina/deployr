<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>deployr — Technician UI kit</title>
<link rel="stylesheet" href="../_shared/ds.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../_shared/icons.jsx"></script>
<script type="text/babel" src="../_shared/components.jsx"></script>
<script type="text/babel" src="../_shared/sample-data.jsx"></script>
<script type="text/babel" src="TicketList.jsx"></script>
<script type="text/babel" src="TicketDetail.jsx"></script>

<script type="text/babel">
const TECH_NAV = [
  { label: "Mis Tickets", href: "/tech", icon: "clipboard" },
];

function TechApp() {
  // Technician sees only tickets assigned to them — narrow the sample data.
  const initial = SAMPLE.tickets.filter(t => t.technician && t.technician.id === "t1");
  const [tickets, setTickets] = React.useState(initial);
  const [openId, setOpenId] = React.useState(null);
  const { toast, show } = useToast();

  function updateTicket(updated) {
    setTickets(prev => prev.map(t => t.id === updated.id ? updated : t));
  }

  const open = openId ? tickets.find(t => t.id === openId) : null;

  return (
    <div className="app-shell">
      <Sidebar
        userName="Carlos Mendoza"
        role="técnico"
        nav={TECH_NAV}
        activeHref="/tech"
        onNavigate={() => { setOpenId(null); }}
        onLogout={() => show({ title: "Cerrar sesión" })}
      />
      <main className="main">
        {open
          ? <TechTicketDetail ticket={open} onBack={() => setOpenId(null)} onUpdateTicket={updateTicket} onToast={show} />
          : <TechTicketList tickets={tickets} onOpen={setOpenId} />}
      </main>
      <Toast toast={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TechApp />);
</script>
</body>
</html>
